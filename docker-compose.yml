version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: canadian-startup-jobs-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-canadian_startup_jobs}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-canadian_startup_jobs}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - canadian-startup-jobs-network

volumes:
  postgres_data:
    driver: local

networks:
  canadian-startup-jobs-network:
    driver: bridge

